<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Nayra 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--rosa:#FFD6E8;
--lilas:#E4D7FF;
--azul:#D6F0FF;
--amarelo:#FFF2C6;
--paper:#fffdf7;
--texto:#3a3a3a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins', sans-serif;
background: linear-gradient(-45deg,var(--rosa),var(--lilas),var(--azul),var(--amarelo));
background-size:400% 400%;
animation:bgMove 15s ease infinite;
text-align:center;
overflow-x:hidden;
color:var(--texto);
position:relative;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CORAÇÕES */
.heart{
position:fixed;
bottom:-20px;
font-size:18px;
animation: floatUp 8s linear forwards;
opacity:0.7;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
transition:opacity 0.8s ease;
}

.hidden{display:none !important;}

/* 🔒 LOCK SCREEN */

#lockScreen{
position:fixed;
inset:0;
background:linear-gradient(-45deg,#FFD6E8,#E4D7FF,#D6F0FF,#FFF2C6);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
z-index:9999;
}

#lockScreen h1{
font-family:'Playfair Display', serif;
font-size:1.8rem;
margin-bottom:10px;
}

#lockScreen p{
margin-top:10px;
}

.countdown{
margin-top:20px;
font-size:1.4rem;
font-weight:600;
}

.clock{
margin-top:10px;
font-size:1rem;
opacity:0.8;
}

.releaseDate{
margin-top:20px;
font-size:0.85rem;
opacity:0.6;
}

/* Envelope */
#envelope{
width:260px;
height:170px;
background:white;
position:relative;
cursor:pointer;
border-radius:12px;
box-shadow:0 25px 50px rgba(0,0,0,0.15);
perspective:1000px;
transition:transform 0.3s;
}

#envelope:hover{transform:scale(1.05);}

#flap{
position:absolute;
width:100%;
height:100%;
background:var(--rosa);
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
}

.open #flap{transform:rotateX(180deg);}

/* Carta */
.letter{
width:320px;
background:var(--paper);
padding:30px;
border-radius:15px;
box-shadow:0 25px 50px rgba(0,0,0,0.2);
transform:scaleY(0);
transform-origin:top;
transition:0.8s ease;
margin-top:20px;
}

.letter.open{transform:scaleY(1);}

.typewriter{
font-family:'Playfair Display', serif;
font-size:1.2rem;
white-space:pre-line;
}

button{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:30px;
background:var(--rosa);
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

/* Jogo */
.game-area{
display:grid;
grid-template-columns:repeat(4,80px);
gap:15px;
margin-top:20px;
}

.icon{
font-size:35px;
cursor:pointer;
transition:0.3s;
}

.icon:hover{transform:scale(1.3);}

/* Popup */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
}

.popup-content{
background:var(--paper);
padding:25px;
border-radius:20px;
width:300px;
animation:popIn 0.4s ease;
}

@keyframes popIn{
from{transform:scale(0.7);}
to{transform:scale(1);}
}

/* Pug rain */
.pugRain{
position:fixed;
top:-50px;
font-size:25px;
animation:rain 3s linear forwards;
pointer-events:none;
}

@keyframes rain{
to{transform:translateY(110vh);}
}

/* Final glow */
.finalText{
font-family:'Playfair Display', serif;
font-size:1.8rem;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #fff;}
to{text-shadow:0 0 20px #ff7aa2;}
}

/* ✨ FOTOS ESTILO POLAROID ✨ */

.memoryPhotos{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:30px;
}

 .polaroid{
background:white;
padding:10px 10px 25px 10px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
border-radius:10px;
opacity:0;
transform:translateY(30px) rotate(-3deg);
transition:all 0.8s ease;
}

.polaroid:nth-child(2){
transform:translateY(30px) rotate(3deg);
}

.polaroid img{
width:160px;
border-radius:8px;
}

.polaroid.show{
opacity:1;
transform:translateY(0) rotate(0deg);
}

video{
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
  



<section id="step1">
<div id="envelope" onclick="openLetter()">
<div id="flap"></div>
</div>
<p>Clique para abrir 💌</p>
</section>

<section id="step2" class="hidden">
<div class="letter" id="mainLetter">
<div class="typewriter" id="mainText"></div>
</div>
<button id="continueBtn" class="hidden" onclick="goGame()">Continuar 💗</button>
</section>

<section id="step3" class="hidden">
<h2>Encontre o Pug 🐶</h2>
<div class="game-area" id="gameArea"></div>
</section>

<div id="popup" class="popup hidden">
<div class="popup-content">
<h3>Carta Secreta 💌</h3>
<p>
Para Nayra Cambridge, obrigada por criar e viver neste mundo comigo.<br><br>
- A.C
</p>
<br>
<button onclick="closePopup()">Fechar 💗</button>
</div>
</div>

<section id="step4" class="hidden">
<h2>Nossas memórias 🎥</h2>

<div class="memoryPhotos">
<div class="polaroid">
<img src="foto1.jpg" alt="Memória 1">
</div>
<div class="polaroid">
<img src="foto2.jpg" alt="Memória 2">
</div>
</div>

<video src="video.mp4" width="300" controls></video>
<br><br>
<button onclick="finalSurprise()">Abrir recado final ✨</button>
</section>

<section id="step5" class="hidden">
<div class="finalText">
Parabéns piccola, eu amo você. 💗
</div>
</section>

<script>

/* CORAÇÕES */
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*15+10)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart,700);

/* CARTA */

const mainMessage = "Nay, quero que sempre possa lembrar que nossa amizade é uma parte de meu coração. Você é um presente para mim e te ter por perto é um privilégio. Eu te amo pugzinha, parabéns por ser essa pessoa incrível e que venha muitos mais aniversários para comemorarmos.";

let i=0;

function openLetter(){
document.getElementById("envelope").classList.add("open");

setTimeout(()=>{
document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");
document.getElementById("mainLetter").classList.add("open");
typeMain();
},1000);
}

function typeMain(){
if(i<mainMessage.length){
document.getElementById("mainText").innerHTML+=mainMessage.charAt(i);
i++;
setTimeout(typeMain,25);
}else{
document.getElementById("continueBtn").classList.remove("hidden");
}
}

function goGame(){
document.getElementById("step2").classList.add("hidden");
document.getElementById("step3").classList.remove("hidden");
shuffleGame();
}

/* JOGO */

const icons=["💗","🌸","✨","🎀","⭐"];
const gameArea=document.getElementById("gameArea");

function shuffleGame(){
gameArea.innerHTML="";
let pugIndex=Math.floor(Math.random()*16);

for(let i=0;i<16;i++){
let div=document.createElement("div");
div.classList.add("icon");

if(i===pugIndex){
div.textContent="🐶";
div.onclick=winGame;
}else{
div.textContent=icons[Math.floor(Math.random()*icons.length)];
div.onclick=shuffleGame;
}

gameArea.appendChild(div);
}
}

function winGame(){
pugRain();
setTimeout(()=>{
document.getElementById("popup").classList.remove("hidden");
},1500);
}

 function pugRain(){
for(let i=0;i<30;i++){
const pug=document.createElement("div");
pug.classList.add("pugRain");
pug.innerHTML="🐶";
pug.style.left=Math.random()*100+"vw";
document.body.appendChild(pug);
setTimeout(()=>pug.remove(),3000);
}
}

function closePopup(){
document.getElementById("popup").classList.add("hidden");
document.getElementById("step3").classList.add("hidden");
document.getElementById("step4").classList.remove("hidden");

/* anima fotos uma por uma */
const polaroids=document.querySelectorAll(".polaroid");
polaroids.forEach((p,index)=>{
setTimeout(()=>{p.classList.add("show");},500*index);
});
}

function finalSurprise(){
document.getElementById("step4").classList.add("hidden");
document.getElementById("step5").classList.remove("hidden");
}

/* 🔒 BLOQUEIO ATÉ 03/03/2026 00:00 */

const releaseDate = new Date("2026-03-03T00:00:00-03:00");
const lockScreen = document.getElementById("lockScreen");
const countdown = document.getElementById("countdown");
const clock = document.getElementById("clock");

function updateCountdown(){
const now = new Date();
const diff = releaseDate - now;


/* desbloqueia */
if(diff <= 0){
lockScreen.style.opacity="0";
setTimeout(()=>{ lockScreen.style.display="none"; },800);
clearInterval(timer);
return;
}

/* cálculo */
const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff / (1000*60*60)) % 24);
const minutes = Math.floor((diff / (1000*60)) % 60);
const seconds = Math.floor((diff / 1000) % 60);}

const timer = setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>

</html>
